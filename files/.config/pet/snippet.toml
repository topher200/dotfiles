[[Snippets]]
  Description = "continuously fix python typing"
  Output = ""
  Tag = []
  command = "~/dev/continuous-claude/continuous_claude.sh --disable-commits --max-runs 25 -p \"Run this script to remove a file from basedpyright, then fix the typing issues reported in that file by basedpyright after the removal: '''REMOVED=$(jq -r '.files | keys | .[-1]' .basedpyright/baseline.json) && jq --indent 4 '.files |= (to_entries | .[:-1] | from_entries)' .basedpyright/baseline.json > tmp.jq && mv tmp.jq .basedpyright/baseline.json && echo Removed: $REMOVED'''. Fix typing issues in as reported by basedpyright, following the guidance from .claude/agents/python-typing-resolver.md and .cursor/rules/python-best-practices.mdc. At the end of each turn, record in the state file the file you fixed and how many errors were removed. At the start of each turn, choose a new file (do not check one already in the state file). There is no need to recheck previous work, just focus on your new file.\""

